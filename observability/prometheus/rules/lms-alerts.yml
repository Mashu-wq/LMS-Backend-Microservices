groups:
  - name: lms-service-alerts
    interval: 30s
    rules:

      # Service Down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      # High Error Rate (5xx)
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in {{ $labels.application }}"
          description: "Error rate is {{ $value | humanizePercentage }} in {{ $labels.application }}"

      # High Latency (P99 > 2s)
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (application, le)
          ) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency in {{ $labels.application }}"
          description: "P99 latency is {{ $value }}s in {{ $labels.application }}"

      # Circuit Breaker Open
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker OPEN for {{ $labels.name }}"
          description: "Circuit breaker {{ $labels.name }} in {{ $labels.application }} is open"

      # High JVM Memory Usage
      - alert: HighJvmMemoryUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage in {{ $labels.application }}"
          description: "JVM heap usage is {{ $value | humanizePercentage }} in {{ $labels.application }}"

      # Payment Service Specific — Payment Failures
      - alert: HighPaymentFailureRate
        expr: |
          sum(rate(payment_transactions_total{status="failed"}[5m])) by (application)
          /
          sum(rate(payment_transactions_total[5m])) by (application)
          > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value | humanizePercentage }}"

  - name: lms-infrastructure-alerts
    rules:

      # Postgres Connection Pool Exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          hikaricp_connections_active
          /
          hikaricp_connections_max
          > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool near exhaustion in {{ $labels.application }}"
          description: "{{ $value | humanizePercentage }} of connection pool used"

      # RabbitMQ Queue Depth
      - alert: RabbitMQQueueDepthHigh
        expr: rabbitmq_queue_messages > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} is growing"
          description: "Queue depth is {{ $value }} messages"
