spring:
  data:
    mongodb:
      auto-index-creation: false
    redis:
      host: localhost
      port: 6379
  cache:
    type: none   # Disable Redis caching in tests; test repository directly

  rabbitmq:
    host: localhost
    port: 5672

management:
  endpoints:
    web:
      exposure:
        include: health

eureka:
  client:
    enabled: false
