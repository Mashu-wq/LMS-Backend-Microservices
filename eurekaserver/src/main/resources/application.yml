spring:
  application:
    name: eurekaserver
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_USERNAME:config-admin}:${CONFIG_SERVER_PASSWORD:config-secret}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}/"
  security:
    user:
      name: ${EUREKA_USERNAME:eureka-admin}
      password: ${EUREKA_PASSWORD:eureka-secret}

# Bootstrap fallback — these are overridden by config server
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
