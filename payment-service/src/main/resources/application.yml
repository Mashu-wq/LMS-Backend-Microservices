spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_USERNAME:config-admin}:${CONFIG_SERVER_PASSWORD:config-secret}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}/"
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${AUTH_SERVICE_HOST:auth-service}:9000/auth/v1/.well-known/jwks.json
