server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/lms_users
    username: ${DB_USERNAME:lms_user}
    password: ${DB_PASSWORD:lms_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis for caching user profiles
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:lms_user}
    password: ${RABBITMQ_PASSWORD:lms_password}
    virtual-host: /lms
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5

eureka:
  client:
    service-url:
      defaultZone: http://eureka-admin:eureka-secret@${EUREKA_HOST:eurekaserver}:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# Feign clients used by user-service (none currently — it IS the source of truth)
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000

# Override global resilience4j defaults to include Feign exceptions
resilience4j:
  circuitbreaker:
    configs:
      default:
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
  retry:
    configs:
      default:
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
