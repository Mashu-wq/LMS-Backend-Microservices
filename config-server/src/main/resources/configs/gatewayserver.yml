server:
  port: 8080

spring:
  application:
    name: gatewayserver
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false  # Manual routing for control
          lower-case-service-id: true
      httpclient:
        connect-timeout: 2000
        response-timeout: 10s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  # Redis for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Gateway validates tokens using auth-service's public JWKS endpoint
          jwk-set-uri: http://${AUTH_SERVICE_HOST:auth-service}:9000/auth/v1/.well-known/jwks.json

eureka:
  client:
    service-url:
      defaultZone: http://eureka-admin:eureka-secret@${EUREKA_HOST:eurekaserver}:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        base-config: default
      userServiceCB:
        base-config: default
      courseServiceCB:
        base-config: default
      paymentServiceCB:
        base-config: default
  timelimiter:
    instances:
      authServiceCB:
        timeout-duration: 5s
      courseServiceCB:
        timeout-duration: 8s

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    reactor.netty: INFO
