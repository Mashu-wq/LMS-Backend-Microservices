server:
  port: 8085

spring:
  application:
    name: notification-service

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:lms_user}
    password: ${RABBITMQ_PASSWORD:lms_password}
    virtual-host: /lms
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5
        default-requeue-rejected: false  # rejected messages go to DLQ, not requeued

  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-admin:eureka-secret@${EUREKA_HOST:eurekaserver}:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

notification:
  email:
    from: noreply@lms-platform.com
    from-name: LMS Platform

# Resilience4j — circuit breakers for Feign calls to user/course services
resilience4j:
  circuitbreaker:
    configs:
      default:
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      course-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    configs:
      default:
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
