spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    config:
      enabled: false
  cache:
    type: none
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/noop

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false
